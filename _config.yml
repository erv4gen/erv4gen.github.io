theme: jekyll-theme-minimal
title: Vova's Blog # You can update this
description: >
  I write about machine learning and finance

# Basic GitHub Pages settings
baseurl: "" # For user/organization pages like erv4gen.github.io
url: "https://erv4gen.github.io" # Your site's full URL

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge # Optional: for code highlighting
  math_engine: mathjax

# Plugins (GitHub Pages has a specific list of supported plugins)
# If you add plugins not on the list, you might need a GitHub Action to build.
# For now, jekyll-theme-minimal handles basic needs.
plugins:
  - jekyll-feed # For RSS feed, supported by GitHub Pages

# Tag archive pages are NOT generated by jekyll-archives (that plugin is not on
# GitHub Pages' safe-mode allowlist, so it never runs). Instead, each tag has a
# static stub in /tag/<slug>.html using the `archive-tag` layout, which lists
# posts via the core `site.tags` variable. Add a new stub when adding a new tag.

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - analyze_wordpress_xml.py
  - migrate_wp_to_jekyll.py
  - .clinerules
  - .eleventy.js # If not deleted
  - package.json # If not deleted
  - _src # If not deleted
  - _jekyll_export # If not deleted
  - uploads.zip # Exclude the zip file itself
